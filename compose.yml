
name: my-hotel-reservation
services:
  db:
    container_name: hotel-reservation-db
    image: postgres:16
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis
    ports:
      - "6379:6379"

volumes:
  db-data:
#  uploads: